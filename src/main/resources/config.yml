# Summit CustomArmor Configuration

# Storage backend: 'yaml' (default, no setup required) or 'mariadb'
storage-type: yaml

database:
  host: localhost
  port: 3306
  database: summit_customarmor
  username: root
  password: changeme

proc:
  base-per-piece: 0.02        # Base chance contributed by each worn piece
  increase-per-level: 0.002   # Additional chance per level on each piece
  max-total-chance: 0.15      # Hard cap on final chance
  set-bonus:
    1: 1.0
    2: 1.1
    3: 1.25

  keys:
    common:
      chance: 75
      display-name: "&eCommon Key"
      message: "&eYou found a &eCommon Key&e!"
      commands:
        - "crate give %player% crate_lost physical 1"
    rare:
      chance: 25
      display-name: "&bRare Key"
      message: "&bYou found a &bRare Key&b!"
      commands:
        - "crate give %player% crate_explorer physical 1"
    epic:
      chance: 0
      display-name: "&5Epic Key"
      message: "&5You found an &5Epic Key&5!"
      commands:
        - "crate give %player% crate_mystic physical 1"
    legendary:
      chance: 0
      display-name: "&6Legendary Key"
      message: "&6You found a &6Legendary Key&6!"
      commands:
        - "crate give %player% crate_legendary physical 1"

messages:
  equip-1: "&7You equipped &b1/3 &7Key Finder pieces."
  equip-2: "&aYou equipped &b2/3 &aKey Finder pieces! Bonus active."
  equip-3: "&6Full set! All &b3/3 &6Key Finder pieces equipped!"

armor:
  chestplate:
    name: "&bKey Finder Chestplate"
    material: DIAMOND_CHESTPLATE

  leggings:
    name: "&bKey Finder Leggings"
    material: DIAMOND_LEGGINGS

  boots:
    name: "&bKey Finder Boots"
    material: DIAMOND_BOOTS

leveling:
  max-level: 25
  base-xp: 100
  xp-scaling: 1.5

  xp-gain:
    mining: 1
    farming: 1
    fishing: 2
