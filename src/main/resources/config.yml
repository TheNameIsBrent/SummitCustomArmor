# Summit CustomArmor Configuration

# Storage backend: 'yaml' (default, no setup required) or 'mariadb'
storage-type: yaml

database:
  host: localhost
  port: 3306
  database: summit_customarmor
  username: root
  password: changeme

proc:
  base-per-piece: 0.02        # Base chance contributed by each worn piece
  increase-per-level: 0.002   # Additional chance per level on each piece
  max-total-chance: 0.15      # Hard cap on final chance
  set-bonus:
    1: 1.0                # 1 piece worn multiplier
    2: 1.1                # 2 pieces worn multiplier
    3: 1.25               # 3 pieces worn multiplier

  keys:
    common:
      chance: 75
      commands:
        - "crate give %player% crate_lost physical 1"
    rare:
      chance: 25
      commands:
        - "crate give %player% crate_explorer physical 1"
    epic:
      chance: 0
      commands:
        - "crate give %player% crate_mystic physical 1"
    legendary:
      chance: 0
      commands:
        - "crate give %player% crate_legendary physical 1"

armor:
  chestplate:
    name: "&bKey Finder Chestplate"
    material: DIAMOND_CHESTPLATE

  leggings:
    name: "&bKey Finder Leggings"
    material: DIAMOND_LEGGINGS

  boots:
    name: "&bKey Finder Boots"
    material: DIAMOND_BOOTS

leveling:
  max-level: 25
  base-xp: 100
  xp-scaling: 1.5

  xp-gain:
    mining: 1
    farming: 1
    fishing: 2
